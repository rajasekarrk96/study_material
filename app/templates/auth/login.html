{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-laptop-code auth-logo-icon"></i>
            <h1>Welcome Back</h1>
            <p>Sign in to your BB Solutions account</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" tabindex="-1" onclick="togglePass('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Keep me signed in</label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <p class="auth-switch">
            New here? <a href="{{ url_for('auth.register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePass(id) {
    const f = document.getElementById(id);
    f.type = f.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
