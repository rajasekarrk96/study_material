{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus auth-logo-icon"></i>
            <h1>Join EduSphere</h1>
            <p>Start your structured learning journey today</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="your_username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password">
                    <button type="button" class="toggle-password" tabindex="-1" onclick="togglePass('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-rocket"></i> Create Account
            </button>
        </form>
        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePass(id) {
    const f = document.getElementById(id);
    f.type = f.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
