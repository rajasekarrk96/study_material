<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Colors, Backgrounds, Gradients</title>
    <link rel="stylesheet" href="06_colors_backgrounds.css">
</head>
<body>
    <h1>Colors, Backgrounds & Gradients</h1>
    <p>Read <code>06_colors_backgrounds.css</code> for detailed properties.</p>

    <!-- Colors -->
    <div class="color-demo hex">HEX Color (#ff5733)</div>
    <div class="color-demo rgb">RGB Color (rgb(50, 205, 50))</div>
    <div class="color-demo rgba">RGBA (with Alpha/Transparency)</div>
    <div class="color-demo hsl">HSL (Hue, Saturation, Lightness)</div>

    <!-- Background Properties -->
    <div class="bg-demo image-bg">
        Background Image with Cover & Center
    </div>

    <!-- Gradients -->
    <div class="bg-demo linear-grad">Linear Gradient</div>
    <div class="bg-demo radial-grad">Radial Gradient</div>
    <div class="bg-demo repeating-grad">Repeating Gradient</div>

</body>
</html>
