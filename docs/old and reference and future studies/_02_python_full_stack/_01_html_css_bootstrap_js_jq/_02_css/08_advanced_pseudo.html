<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Pseudo-classes & Elements</title>
    <link rel="stylesheet" href="08_advanced_pseudo.css">
</head>
<body>
    <h1>Advanced Pseudo-classes & Pseudo-elements</h1>
    <p>See <code>08_advanced_pseudo.css</code></p>

    <!-- Structural Pseudo-classes -->
    <ul class="advanced-list">
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
        <li>Fourth item</li>
    </ul>

    <!-- State & Negation Pseudo-classes -->
    <div class="form-container">
        <label>Focus Within Demo:</label><br>
        <input type="text" placeholder="Click me...">
        <p class="special-note">This is a regular note.</p>
        <p class="special-note disabled">This note is disabled.</p>
    </div>

    <!-- Pseudo-elements (Before & After) -->
    <div class="quote-box">
        CSS is awesome!
    </div>
    
    <!-- Custom Selection Selection -->
    <p class="selection-text">Select this text to see a custom highlight color.</p>

</body>
</html>
