<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery AJAX & Form Serialization</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .container { margin: 20px; font-family: sans-serif; }
        .result-box { background: #f4f4f4; padding: 15px; border: 1px solid #ddd; margin-top: 15px; min-height: 100px;}
        form { border: 1px solid #ccc; padding: 15px; width: 300px; }
        input { display: block; margin-bottom: 15px; width: 90%; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>jQuery AJAX & Form Serialization Deep Dive</h1>

        <h2>1. $.ajax() Comprehensive Fetch</h2>
        <button id="btn-fetch-users">Fetch Users (AJAX)</button>
        <div id="users-results" class="result-box">User data will appear here...</div>

        <h2>2. Form Serialization (Sending Data)</h2>
        <form id="my-signup-form">
            <label>First Name:</label>
            <!-- IMPORTANT: MUST HAVE 'name' ATTRIBUTE for serialization! -->
            <input type="text" name="firstname" value="John">
            
            <label>Last Name:</label>
            <input type="text" name="lastname" value="Doe">
            
            <label>Email:</label>
            <input type="email" name="email" value="john@doe.com">
            
            <button type="submit" id="btn-form">Serialize & Simulate Send</button>
        </form>
        <div id="form-results" class="result-box">Serialized string will appear here...</div>
    </div>

    <script>
        /*
        ========================================================
        TOPIC: AJAX DEEP DIVE & FORM SERIALIZATION
        ========================================================

        1. The Core `$.ajax()` Method:
           - Performs an asynchronous HTTP (Ajax) request.
           - Syntax involves passing a large configuration object:
             `$.ajax({ url: "...", type: "GET/POST", data: {}, success: fn, error: fn })`
           - The backbone that `.get()`, `.post()`, and `.load()` are built upon.

        2. Returning Promises (Modern Pattern):
           - In modern jQuery (3.0+), $.ajax returns a Promises/A+ compatible object (Deferred object).
           - This means instead of passing `success` and `error` callbacks inside the config object, you SHOULD use `.done()`, `.fail()`, and `.always()`. This prevents "callback hell".

        3. Form Serialization:
           - `.serialize()`: Creates a URL-encoded text string by serializing form values (e.g., "firstname=John&lastname=Doe&email=john%40doe.com").
           - Extradordinarily useful for packaging the entire form's data perfectly to send to the server via AJAX `data` parameter.
           - CRITICAL RULE: In order to be serialized, inputs MUST have a `name` attribute. `id` is not enough.
        */

        $(function() {

            // =========================================================
            // Example 1: Comprehensive AJAX Fetch with Promises
            // =========================================================
            $("#btn-fetch-users").click(function() {
                
                $("#users-results").html("<em>Loading...</em>");
                
                // Modern Promise-based syntax
                const request = $.ajax({
                    url: "https://jsonplaceholder.typicode.com/users",
                    type: "GET",
                    dataType: "json", // Expecting JSON back
                    // Don't use success/error callbacks here anymore!
                });

                // Chaining the promise handlers
                request.done(function(response) {
                    // Success!
                    console.log("Data received:", response);
                    
                    // Build a string of HTML
                    let htmlString = "<ul>";
                    $.each(response, function(index, user) {
                        htmlString += `<li><strong>${user.name}</strong> (${user.email})</li>`;
                    });
                    htmlString += "</ul>";
                    
                    // Inject the string
                    $("#users-results").html(htmlString);
                });

                request.fail(function(jqXHR, textStatus, errorThrown) {
                    // Error Handling
                    $("#users-results").html(`<span style="color:red">Error Fetching Data: ${errorThrown}</span>`);
                });

                request.always(function() {
                    // Runs regardless of success/fail (like 'finally' in Try/Catch)
                    console.log("AJAX Request completed.");
                });
            });

            // =========================================================
            // Example 2: Form Serialization
            // =========================================================
            $("#my-signup-form").submit(function(e) {
                // 1. Prevent normal page reload
                e.preventDefault();

                // 2. Serialize ALL form inputs into a single text string automatically
                const formData = $(this).serialize();
                
                // 3. Display it. (Notice how it grabbed John, Doe, and the email automatically!)
                $("#form-results").text(formData);

                /*
                // REAL WORLD USAGE (Simulated):
                $.ajax({
                    url: '/api/signup',
                    type: 'POST',
                    data: formData   <--- Pass the entire encoded string directly to the server!
                }).done(function(resp) {
                    alert("Signed up!");
                });
                */
            });

        });

        /*
        INTERVIEW TIP:
        - "Why isn't jQuery `.serialize()` capturing my input?"
          Answer: "Because your `<input>` element is missing the `name` attribute. jQuery requires the `name` attribute to construct the key/value pair."
        - "What is the modern way to handle $.ajax responses in jQuery?"
          Answer: "Since jQuery 3.0, it returns a Promise. You should use `.done()`, `.fail()`, and `.always()` instead of nesting `success` and `error` callbacks inside the setup object. This promotes cleaner, chainable code."
        */
    </script>
</body>
</html>
