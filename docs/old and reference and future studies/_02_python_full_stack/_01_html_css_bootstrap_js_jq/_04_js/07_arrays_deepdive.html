<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Arrays Deep Dive</title>
</head>
<body>
    <h1>JavaScript Arrays: Expert Level</h1>
    <p>Check the console for script output.</p>

    <script>
        /*
        ========================================================
        TOPIC: ARRAYS DEEP DIVE
        ========================================================

        1. Mutating vs Non-Mutating Methods:
           - Mutating (changes original array): push(), pop(), shift(), unshift(), splice(), sort(), reverse().
           - Non-Mutating (returns a new array/value): map(), filter(), reduce(), slice(), concat(), flat(), some(), every(), find(), findIndex().

        2. Crucial Array Methods for Interviews:
           - .some(): Returns true if AT LEAST ONE element passes the condition.
           - .every(): Returns true ONLY if ALL elements pass the condition.
           - .find(): Returns the FIRST element that passes the condition (or undefined).
           - .findIndex(): Same as find(), but returns index.
           - .splice(start, deleteCount, item1...): Adds/removes items from an array. (MUTATES).
           - .slice(start, end): Returns a shallow copy of a portion of an array. (NON-MUTATING).
           - .flat(depth): Creates a new array with all sub-array elements concatenated into it recursively up to the specified depth.
        */

        console.log("--- ARRAYS DEEP DIVE ---");
        
        const nums = [1, 2, 3, 4, 5, 8, 9];

        // 1. some() and every()
        console.log("Has even number?", nums.some(n => n % 2 === 0)); // true
        console.log("Are all positive?", nums.every(n => n > 0));     // true

        // 2. find() vs filter()
        // find returns the element itself (first match)
        const firstLarge = nums.find(n => n > 4); 
        console.log("First > 4:", firstLarge); // 5

        // filter returns an ARRAY of all matches
        const allLarge = nums.filter(n => n > 4); 
        console.log("All > 4:", allLarge); // [5, 8, 9]

        // 3. Splice vs Slice (Extremely common interview subject)
        const letters = ['a', 'b', 'c', 'd', 'e'];
        
        // SLICE: Give me a copy from index 1 up to (but not including) index 3
        const sliced = letters.slice(1, 3); 
        console.log("Sliced (pure):", sliced); // ['b', 'c']
        console.log("Original untouched:", letters); // ['a', 'b', 'c', 'd', 'e']

        // SPLICE: At index 2, delete 2 items, and insert 'X', 'Y'
        const spliced = letters.splice(2, 2, 'X', 'Y');
        console.log("Spliced (removed items):", spliced); // ['c', 'd']
        console.log("Original mutated!:", letters); // ['a', 'b', 'X', 'Y', 'e']

        // 4. Flattening Arrays
        const nested = [1, [2, 3], [[4, 5]]];
        console.log("Flat (depth 1):", nested.flat()); // [1, 2, 3, [4, 5]]
        console.log("Flat (depth infinity):", nested.flat(Infinity)); // [1, 2, 3, 4, 5]

        /*
        INTERVIEW TIP:
        - "What is the difference between slice and splice?" 
          Answer: `.slice()` does NOT mutate the original array, it returns a shallow copy. `.splice()` mutates the original array by deleting/inserting items in place.
        - "How does `.sort()` handle numbers by default?"
          Answer: Horribly! It converts them to strings and sorts alphabetically. `[10, 2, 1]` becomes `[1, 10, 2]`. 
          To sort numbers correctly: `arr.sort((a,b) => a - b)` (ascending).
        */
    </script>
</body>
</html>
