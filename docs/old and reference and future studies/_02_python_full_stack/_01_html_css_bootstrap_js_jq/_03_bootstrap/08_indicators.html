<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Indicators & Status</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="mb-5">Indicators (Badges, Progress, Spinners)</h1>

        <!-- 
            ========================================================
            TOPIC: INDICATORS AND STATUS MESSAGES
            ========================================================

            1. Badges:
               - Small count or label components (e.g., "New", or a notification count).
               - Uses `.badge` and a background utility like `.bg-danger`.
               - `.rounded-pill` makes them more oval.

            2. Progress Bars:
               - Visual indicators for loading/completion states.
               - Wrap a `.progress-bar` inside a `.progress` container.
               - Control width via inline style: `style="width: 25%"`.

            3. Spinners:
               - Loading animations (replaces older GIF loaders).
               - `.spinner-border` (circle) or `.spinner-grow` (pulsing dot).

            4. Alerts & Toasts:
               - Alerts (`.alert`) are standard inline message boxes.
               - Toasts (`.toast`) are lightweight push notifications designed to mimic the push notifications popularized by mobile OSs (pop up in a corner). Toasts require JS initialization to show().
        -->

        <div class="row">
            <div class="col-md-6 mb-4">
                <h3>1. Badges</h3>
                <button type="button" class="btn btn-primary position-relative">
                    Inbox
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        99+
                        <span class="visually-hidden">unread messages</span>
                    </span>
                </button>
                <div class="mt-3">
                    <span class="badge bg-success">Success</span>
                    <span class="badge rounded-pill bg-warning text-dark">Warning Pill</span>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <h3>2. Spinners</h3>
                <!-- Standard spinner -->
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <!-- Growing/pulsing spinner -->
                <div class="spinner-grow text-danger" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <!-- Spinner inside a button -->
                <button class="btn btn-primary ms-3" type="button" disabled>
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    Loading...
                </button>
            </div>
        </div>

        <div class="mb-5">
            <h3>3. Progress Bars</h3>
            <!-- Standard -->
            <div class="progress mb-3">
                <div class="progress-bar" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">25%</div>
            </div>
            <!-- Striped and Animated -->
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>

    </div>

    <!-- Include Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
