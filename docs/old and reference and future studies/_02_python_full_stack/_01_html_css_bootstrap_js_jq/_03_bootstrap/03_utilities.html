<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Utilities & Helpers</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .demo-box { height: 100px; width: 100px; border: 1px solid #ccc; display: inline-block; }
    </style>
</head>
<body>
    <div class="container my-5">
        <h1>Bootstrap Utilities</h1>
        
        <!-- 
            ========================================================
            TOPIC: UTILITIES (SPACING, TYPOGRAPHY, DISPLAY)
            ========================================================

            1. Spacing (Margin & Padding):
               - Format: {property}{sides}-{size} OR {property}{sides}-{breakpoint}-{size}
               - Property: m (margin), p (padding).
               - Sides:
                 - t (top), b (bottom), s (start/left), e (end/right).
                 - x (left and right), y (top and bottom).
                 - blank (all 4 sides).
               - Size: 0 (0px) to 5 (3rem), plus auto.
               - Examples: .mt-3 (margin-top: 1rem), .px-5 (padding left/right), .mx-auto (horizontally center block elements).

            2. Typography:
               - .h1 through .h6 (look like headings independent of the tag).
               - .display-1 through .display-6 (larger, bolder headings).
               - .lead (makes a paragraph stand out).
               - .text-center, .text-end, .fw-bold, .text-decoration-none.

            3. Display / Visibility:
               - .d-none (display: none), .d-block, .d-inline, .d-flex.
               - Responsive display: .d-none .d-md-block (hidden on mobile, visible on medium+ screens).
        -->

        <h2>1. Spacing Examples</h2>
        <!-- padding all 4 sides, margin bottom -->
        <div class="bg-light p-4 mb-4 border border-primary">
            I have <code>p-4</code> and <code>mb-4</code>.
        </div>
        
        <!-- Center a block element with mx-auto -->
        <div class="bg-dark text-white p-3 mx-auto" style="width: 200px;">
            I am centered with <code>mx-auto</code>.
        </div>

        <h2 class="mt-5">2. Flexbox Utilities</h2>
        <!-- Apply flex rules right in HTML -->
        <div class="d-flex justify-content-between align-items-center bg-light p-3 border">
            <div class="demo-box bg-success text-white p-2">Item 1</div>
            <div class="demo-box bg-danger text-white p-2">Item 2</div>
        </div>

        <h2 class="mt-5">3. Responsive Display</h2>
        <div class="alert alert-warning d-block d-md-none">
            I am ONLY visible on mobile screens (sm and down).
        </div>
        <div class="alert alert-info d-none d-md-block">
            I am ONLY visible on desktop screens (md and up).
        </div>
    </div>

    <!-- 
        INTERVIEW TIP:
        - "How do you hide an element on mobile but show it on desktop in Bootstrap?"
          (Answer: Use utility classes `d-none d-md-block`)
        - You MUST know the Spacing syntax. Knowing `mb-5` vs `mt-2` without looking it up shows practical experience.
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
